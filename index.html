<header>

    <h1>English News for Your Level</h1>

    <p>
        Learn English with Real News
    </p>

</header>



<main>


    <!-- ニュース一覧 -->
    <div class="news-list" id="news-list"></div>



    <!-- 記事表示エリア -->
    <div id="article">


        <h2 id="title">
            Select a News Article
        </h2>



        <!-- レベル切り替え -->
        <div class="buttons">

            <button onclick="changeLevel(1)">
                Level 1（高校入試）
            </button>


            <button onclick="changeLevel(2)">
                Level 2（大学入試）
            </button>


            <button onclick="changeLevel(3)">
                Level 3（TOEIC）
            </button>

        </div>



        <!-- 本文 -->
        <div id="content"></div>


    </div>


</main>
